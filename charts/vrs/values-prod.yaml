profile: production-cluster

api:
  replicas: 2

runtime:
  scratch:
    enabled: false

deepstreamWorker:
  enabled: true
  replicas: 2
  image:
    repository: vrs-deepstream
    tag: ds8
    pullPolicy: IfNotPresent
  command:
    - /opt/vrs/bin/vrs-deepstream-worker
  args:
    - --pipeline
    - filesrc location=/data/vrs/input.mp4 ! qtdemux ! h264parse ! nvv4l2decoder ! m.sink_0 nvstreammux name=m batch-size=1 width=640 height=640 enable-padding=1 live-source=0 ! nvinfer config-file-path=/opt/vrs/share/deepstream/configs/pgie-yoloe-safety.txt ! nvtracker ll-lib-file=/opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so ! vrsmeta stream-id=production-stream detector-id=ds8-nvinfer labels=/opt/vrs/share/deepstream/configs/yoloe-safety-labels.txt output-mode=jsonl output-path=/tmp/vrs/deepstream_detections.jsonl ! fakesink name=sink sync=false
    - --disable-probe
  gpuRole: deepstream
  publisher:
    enabled: true
  volumeMounts:
    - name: deepstream-output
      mountPath: /tmp/vrs
    - name: deepstream-input
      mountPath: /data/vrs
      readOnly: true
    - name: deepstream-models
      mountPath: /models
      readOnly: true
  volumes:
    - name: deepstream-output
      emptyDir: {}
    - name: deepstream-input
      persistentVolumeClaim:
        claimName: vrs-deepstream-input
    - name: deepstream-models
      persistentVolumeClaim:
        claimName: vrs-deepstream-models

verifierWorker:
  enabled: false
  replicas: 2
  gpuRole: verifier

redis:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi

objectStorage:
  mode: seaweedfs
  pvc:
    enabled: false
  seaweedfs:
    enabled: true
    bucket: vrs-evidence
    size: 500Gi

sampleMetadata:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
