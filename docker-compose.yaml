services:
  rtsp:
    image: bluenviron/mediamtx:1.12.3
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"

  clip-init:
    image: jrottenberg/ffmpeg:6.1-alpine
    environment:
      VRS_SAMPLE_CLIP: ${VRS_SAMPLE_CLIP:-falldown_test.mp4}
    volumes:
      - ./clips:/clips
    entrypoint:
      - sh
      - -c
    command:
      - |
        sample="$${VRS_SAMPLE_CLIP:-falldown_test.mp4}";
        if [ "$$sample" = "falldown_test.mp4" ] && [ ! -s "/clips/$$sample" ]; then
          ffmpeg -y -f lavfi -i color=c=0x101719:size=640x360:rate=30 -t 10 \
            -vf "drawbox=x=0:y=241:w=640:h=2:color=0x3e5058:t=fill,drawbox=x=300:y=0:w=34:h=258:color=0xb4c6d2:t=fill,drawbox=x=286:y=0:w=62:h=18:color=0xbcd0dc:t=fill,format=yuv420p" \
            -c:v libx264 -preset veryfast -pix_fmt yuv420p "/clips/$$sample";
        elif [ ! -s "/clips/$$sample" ]; then
          echo "Missing /clips/$$sample. Put the file under ./clips or unset VRS_SAMPLE_CLIP." >&2;
          exit 1;
        fi

  rtsp-falldown:
    image: jrottenberg/ffmpeg:6.1-alpine
    depends_on:
      rtsp:
        condition: service_started
      clip-init:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      VRS_SAMPLE_CLIP: ${VRS_SAMPLE_CLIP:-falldown_test.mp4}
    volumes:
      - ./clips:/clips:ro
    entrypoint:
      - sh
      - -c
    command:
      - |
        sample="$${VRS_SAMPLE_CLIP:-falldown_test.mp4}";
        exec ffmpeg -re -stream_loop -1 -fflags +genpts -i "/clips/$$sample" \
          -map 0:v:0 -an -vf fps=30,format=yuv420p \
          -c:v libx264 -preset veryfast -tune zerolatency -pix_fmt yuv420p \
          -f rtsp -rtsp_transport tcp rtsp://rtsp:8554/falldown

  inference:
    profiles:
      - inference
    build:
      context: .
      dockerfile: Dockerfile.inference
    depends_on:
      - rtsp-falldown
    environment:
      VRS_RTSP_URL: rtsp://rtsp:8554/falldown
      VRS_RUN_OUT: /app/runs/live
      HF_HOME: /models/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - vrs-runs:/app/runs
      - vrs-hf-cache:/models/huggingface
    gpus: all
    command:
      - /app/.venv/bin/python
      - scripts/run_rtsp.py
      - --rtsp
      - rtsp://rtsp:8554/falldown
      - --config
      - configs/tiny.yaml
      - --policy
      - configs/policies/falldown_orin_smoke.yaml
      - --out
      - /app/runs/live

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      VRS_RUNS_ROOT: /app/runs
      VRS_SAMPLE_RTSP_URL: rtsp://127.0.0.1:8554/falldown
      VRS_POLICY_PATH: /app/configs/policies/safety.yaml
    volumes:
      - vrs-runs:/app/runs
    ports:
      - "5445:5445"

  console:
    build:
      context: .
      dockerfile: Dockerfile.console
    depends_on:
      backend:
        condition: service_healthy
      rtsp-falldown:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  vrs-runs:
  vrs-hf-cache:
