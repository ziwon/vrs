<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">VRS Kubernetes platform layers</title>
  <desc id="desc">Horizontal architecture diagram showing the boundary between Kubernetes platform responsibilities and VRS Helm workloads, contracts, storage, transport, GPU runtime, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#172033"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="vrsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="5" refY="2.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4.4 L5.8,2.2 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="5" refY="2.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4.4 L5.8,2.2 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowAmber" markerWidth="7" markerHeight="7" refX="5" refY="2.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4.4 L5.8,2.2 z" fill="#f59e0b"/>
    </marker>
    <style>
      text{font-family:sans-serif;fill:#f8fafc}
      .title{font-size:30px;font-weight:800;fill:#f8fafc}
      .subtitle{font-size:15px;fill:#94a3b8}
      .section{font-size:18px;font-weight:800;fill:#f8fafc}
      .label{font-size:15px;font-weight:700;fill:#f8fafc}
      .small{font-size:12.5px;fill:#cbd5e1}
      .tiny{font-size:11.5px;fill:#94a3b8}
      .panel{fill:#1f2937;stroke:#334155;stroke-width:1.4;filter:url(#shadow)}
      .platform{fill:#172554;stroke:#38bdf8;stroke-width:1.2}
      .vrs{fill:#1e293b;stroke:#64748b;stroke-width:1.2}
      .runtime{fill:#14252d;stroke:#22c55e;stroke-width:1.2}
      .data{fill:#2a1d13;stroke:#f59e0b;stroke-width:1.2}
      .contract{fill:#111827;stroke:#475569;stroke-width:1}
      .chip{fill:#0f172a;stroke:#334155;stroke-width:1}
      .flow{fill:none;stroke-linecap:round;stroke-width:3.5;stroke-dasharray:8 8}
      .blue{stroke:#38bdf8;marker-end:url(#arrowBlue)}
      .green{stroke:#22c55e;marker-end:url(#arrowGreen)}
      .amber{stroke:#f59e0b;marker-end:url(#arrowAmber)}
      .dim{opacity:.72}
      @media (prefers-reduced-motion:no-preference){
        .flow{animation:dash 2s linear infinite}
      }
      @keyframes dash{to{stroke-dashoffset:-64}}
    </style>
  </defs>

  <rect width="1280" height="480" rx="28" fill="url(#bg)"/>

  <g transform="translate(0 -70)">
  <rect class="panel" x="36" y="108" width="1208" height="126" rx="18"/>
  <rect x="36" y="108" width="1208" height="46" rx="18" fill="url(#platformGrad)" opacity=".28"/>
  <text class="section" x="64" y="131">Platform responsibility</text>
  <text class="tiny" x="64" y="150">configured by k3s, kind, EKS, Cilium, Gateway API, ALB, CSI, GPU Operator, or site standards</text>

  <rect class="platform" x="64" y="168" width="160" height="48" rx="12"/>
  <text class="label" x="90" y="190">Kubernetes</text>
  <text class="tiny" x="90" y="208">k3s / kind / k8s</text>

  <rect class="platform" x="250" y="168" width="160" height="48" rx="12"/>
  <text class="label" x="280" y="190">Routing</text>
  <text class="tiny" x="280" y="208">ServiceLB / Gateway</text>

  <rect class="platform" x="436" y="168" width="160" height="48" rx="12"/>
  <text class="label" x="466" y="190">StorageClass</text>
  <text class="tiny" x="466" y="208">local-path / CSI</text>

  <rect class="platform" x="622" y="168" width="170" height="48" rx="12"/>
  <text class="label" x="650" y="190">GPU allocation</text>
  <text class="tiny" x="650" y="208">device plugin / DRA</text>

  <rect class="platform" x="818" y="168" width="170" height="48" rx="12"/>
  <text class="label" x="850" y="190">Observability</text>
  <text class="tiny" x="850" y="208">Prometheus / logs</text>

  <rect class="platform" x="1014" y="168" width="170" height="48" rx="12"/>
  <text class="label" x="1040" y="190">Security</text>
  <text class="tiny" x="1040" y="208">secrets / policy</text>

  <rect class="panel" x="36" y="256" width="1208" height="180" rx="18"/>
  <rect x="36" y="256" width="1208" height="46" rx="18" fill="url(#vrsGrad)" opacity=".24"/>
  <text class="section" x="64" y="279">VRS Helm release</text>
  <text class="tiny" x="64" y="298">charts/vrs packages ordinary Deployments, Services, PVCs, ConfigMaps, and optional ServiceMonitor.</text>

  <rect class="vrs" x="64" y="314" width="148" height="78" rx="14"/>
  <text class="label" x="95" y="342">Console</text>
  <text class="tiny" x="88" y="363">nginx static UI</text>
  <text class="tiny" x="88" y="381">same-origin /api</text>

  <rect class="vrs" x="238" y="314" width="148" height="78" rx="14"/>
  <text class="label" x="294" y="342">API</text>
  <text class="tiny" x="266" y="363">FastAPI service</text>
  <text class="tiny" x="266" y="381">artifacts + policy</text>

  <rect class="runtime" x="412" y="314" width="166" height="78" rx="14"/>
  <text class="label" x="444" y="342">DeepStream</text>
  <text class="tiny" x="442" y="363">DS8 worker pods</text>
  <text class="tiny" x="442" y="381">nvinfer + tracker</text>

  <rect class="vrs" x="604" y="314" width="166" height="78" rx="14"/>
  <text class="label" x="628" y="342">Reasoning plane</text>
  <text class="tiny" x="638" y="363">plugins + verifier</text>
  <text class="tiny" x="638" y="381">policy decisions</text>

  <rect class="data" x="796" y="314" width="166" height="78" rx="14"/>
  <text class="label" x="830" y="342">Transport</text>
  <text class="tiny" x="830" y="363">Redis Streams</text>
  <text class="tiny" x="830" y="381">event handoff</text>

  <rect class="data" x="988" y="314" width="166" height="78" rx="14"/>
  <text class="label" x="1027" y="342">Evidence</text>
  <text class="tiny" x="1018" y="363">SeaweedFS / S3</text>
  <text class="tiny" x="1018" y="381">local PVC for smoke</text>

  <path class="flow blue" d="M212 353H238"/>
  <path class="flow green" d="M386 353H412"/>
  <path class="flow green" d="M578 353H604"/>
  <path class="flow amber" d="M770 353H796"/>
  <path class="flow amber" d="M962 353H988"/>

  <rect class="panel" x="36" y="458" width="1208" height="72" rx="18"/>
  <text class="section" x="64" y="501">Portable contracts</text>

  <rect class="contract" x="280" y="480" width="128" height="30" rx="15"/>
  <text class="tiny" x="306" y="500">detection.v1</text>
  <rect class="contract" x="426" y="480" width="148" height="30" rx="15"/>
  <text class="tiny" x="451" y="500">candidate_alert.v1</text>
  <rect class="contract" x="592" y="480" width="144" height="30" rx="15"/>
  <text class="tiny" x="617" y="500">verified_alert.v1</text>
  <rect class="contract" x="754" y="480" width="146" height="30" rx="15"/>
  <text class="tiny" x="781" y="500">evidence_ref.v1</text>
  <rect class="contract" x="918" y="480" width="164" height="30" rx="15"/>
  <text class="tiny" x="944" y="500">object_manifest.v1</text>
  <rect class="contract" x="1100" y="480" width="90" height="30" rx="15"/>
  <text class="tiny" x="1121" y="500">/api/*</text>

  <path class="flow blue dim" d="M330 216V314"/>
  <path class="flow amber dim" d="M516 216V314"/>
  <path class="flow green dim" d="M707 216V314"/>
  <path class="flow blue dim" d="M903 216V314"/>
  <path class="flow amber dim" d="M1072 216V314"/>

  <rect class="chip" x="64" y="236" width="326" height="26" rx="13"/>
  <text class="tiny" x="84" y="254">Core chart avoids hard-coded GatewayClass, DRA, or ALB.</text>
  <rect class="chip" x="408" y="236" width="360" height="26" rx="13"/>
  <text class="tiny" x="428" y="254">k3s can expose console with ServiceLB; API can stay internal.</text>
  <rect class="chip" x="786" y="236" width="374" height="26" rx="13"/>
  <text class="tiny" x="806" y="254">Future VRS scheduler can adopt DRA or GPU topology when needed.</text>
  </g>
</svg>
