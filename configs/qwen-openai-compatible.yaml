# Served Qwen-family verifier profile.
#
# Start a multimodal model behind a vLLM/SGLang/OpenAI-compatible
# /chat/completions endpoint, then point base_url/model_id at that server.
# This config intentionally stays generic so model choice can be decided by
# eval data instead of being hard-coded into production defaults.

ingest:
  target_fps: 4
  roi_polygon: null

detector:
  backend: "ultralytics"
  model: "yoloe-11l-seg.pt"
  device: "cuda"
  imgsz: 640
  conf_floor: 0.20
  iou: 0.50
  half: true

event_state:
  window: 8
  default_min_persist_frames: 2
  cooldown_s: 10.0

tracker:
  backend: simple_iou
  iou_threshold: 0.30
  max_gap_frames: 5

verifier:
  enabled: true
  backend: "openai_compatible"
  model_id: "qwen-vl-served"
  base_url: "http://127.0.0.1:8000/v1"
  api_key_env: "VRS_VLM_API_KEY"
  timeout_s: 60.0
  dtype: "bf16"
  device: "cuda"
  context_window_s: 4.0
  clip_fps: 4
  max_new_tokens: 1024
  temperature: 0.2
  failure_policy: pass_through
  request_bbox: true
  request_trajectory: true

sink:
  jsonl: alerts.jsonl
  write_thumbnails: true
  thumbnails_dir: thumbnails
  thumbnail_ext: jpg
  thumbnail_quality: 90
  annotated_mp4: annotated.mp4
  write_annotated: false

audit:
  enabled: false

privacy:
  enabled: false
  backend: yunet
  model: "models/face_detection_yunet_2023mar.onnx"
  input_size: 320
  score_threshold: 0.6
  nms_threshold: 0.3
  top_k: 5000
  blur_kernel: 31
  margin_pct: 0.15

calibration:
  enabled: false
