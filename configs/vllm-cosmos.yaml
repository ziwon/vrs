# vLLM live-validation profile for the Cosmos verifier baseline.
#
# This is not the production default. Use it to validate the vLLM backend on a
# CUDA host with the `vllm` extra installed, then compare against the
# transformers baseline on the same clips before changing deployment configs.

ingest:
  target_fps: 4
  roi_polygon: null

detector:
  backend: "ultralytics"
  model: "yoloe-11l-seg.pt"
  device: "cuda"
  imgsz: 640
  conf_floor: 0.20
  iou: 0.50
  half: true

event_state:
  window: 8
  default_min_persist_frames: 2
  cooldown_s: 10.0

tracker:
  backend: simple_iou
  iou_threshold: 0.30
  max_gap_frames: 5

verifier:
  enabled: true
  backend: "vllm"
  model_id: "nvidia/Cosmos-Reason2-2B"
  dtype: "bf16"
  device: "cuda"
  context_window_s: 4.0
  clip_fps: 4
  max_new_tokens: 512
  temperature: 0.0
  failure_policy: pass_through
  request_bbox: true
  request_trajectory: false

sink:
  jsonl: alerts.jsonl
  write_thumbnails: true
  thumbnails_dir: thumbnails
  thumbnail_ext: jpg
  thumbnail_quality: 90
  annotated_mp4: annotated.mp4
  write_annotated: false

audit:
  enabled: false

privacy:
  enabled: false
  backend: yunet
  model: "models/face_detection_yunet_2023mar.onnx"
  input_size: 320
  score_threshold: 0.6
  nms_threshold: 0.3
  top_k: 5000
  blur_kernel: 31
  margin_pct: 0.15

calibration:
  enabled: false
