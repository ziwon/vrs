# TensorRT-LLM verifier validation profile.
#
# This is not a production default. Use it on a target CUDA host with
# TensorRT-LLM installed, then record smoke/eval results before switching a
# runtime profile to verifier.backend: trtllm.

ingest:
  target_fps: 4
  roi_polygon: null

detector:
  backend: "ultralytics"
  model: "yoloe-11l-seg.pt"
  device: "cuda"
  imgsz: 640
  conf_floor: 0.20
  iou: 0.50
  half: true

event_state:
  window: 8
  default_min_persist_frames: 2
  cooldown_s: 10.0

tracker:
  backend: simple_iou
  iou_threshold: 0.30
  max_gap_frames: 5

verifier:
  enabled: true
  backend: "trtllm"
  model_id: "nvidia/Cosmos-Reason2-2B"
  tokenizer_id: null
  dtype: "bf16"
  device: "cuda"
  context_window_s: 4.0
  clip_fps: 4
  max_new_tokens: 1024
  temperature: 0.2
  max_model_len: 8192
  guided_decoding_backend: "xgrammar"
  # Optional speculative decoding knobs. Enable only after a compatible draft
  # model/engine has been validated with the same tokenizer family.
  draft_model_id: null
  draft_engine_dir: null
  speculative_tokens: null
  trtllm_extra_llm_kwargs: null
  failure_policy: pass_through
  request_bbox: true
  request_trajectory: true

sink:
  jsonl: alerts.jsonl
  write_thumbnails: true
  thumbnails_dir: thumbnails
  thumbnail_ext: jpg
  thumbnail_quality: 90
  annotated_mp4: annotated.mp4
  write_annotated: false

audit:
  enabled: false

privacy:
  enabled: false
  backend: yunet
  model: "models/face_detection_yunet_2023mar.onnx"
  input_size: 320
  score_threshold: 0.6
  nms_threshold: 0.3
  top_k: 5000
  blur_kernel: 31
  margin_pct: 0.15

calibration:
  enabled: false
