services:
  rtsp:
    image: bluenviron/mediamtx:1.12.3
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"

  clip-init:
    image: jrottenberg/ffmpeg:6.1-alpine
    volumes:
      - ./runs/pr-integration/clips:/clips
    entrypoint:
      - sh
      - -c
    command:
      - |
        if [ ! -s /clips/falldown_test.mp4 ]; then
          ffmpeg -y -f lavfi -i testsrc2=size=640x360:rate=30 -t 10 \
            -vf "drawbox=x=220:y=210:w=210:h=28:color=white@0.8:t=fill,format=yuv420p" \
            -c:v libx264 -preset veryfast -pix_fmt yuv420p /clips/falldown_test.mp4;
        fi

  rtsp-falldown:
    image: jrottenberg/ffmpeg:6.1-alpine
    depends_on:
      rtsp:
        condition: service_started
      clip-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - ./runs/pr-integration/clips:/clips:ro
    command:
      - -re
      - -stream_loop
      - "-1"
      - -fflags
      - +genpts
      - -i
      - /clips/falldown_test.mp4
      - -map
      - 0:v:0
      - -an
      - -vf
      - fps=30,format=yuv420p
      - -c:v
      - libx264
      - -preset
      - veryfast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://rtsp:8554/falldown

  inference:
    profiles:
      - inference
    build:
      context: .
      dockerfile: Dockerfile.inference
    depends_on:
      - rtsp-falldown
    environment:
      VRS_RTSP_URL: rtsp://rtsp:8554/falldown
      VRS_RUN_OUT: /app/runs/live
      HF_HOME: /models/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - vrs-runs:/app/runs
      - vrs-hf-cache:/models/huggingface
    gpus: all
    command:
      - /app/.venv/bin/python
      - scripts/run_rtsp.py
      - --rtsp
      - rtsp://rtsp:8554/falldown
      - --config
      - configs/tiny.yaml
      - --policy
      - configs/policies/falldown_orin_smoke.yaml
      - --out
      - /app/runs/live

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      VRS_RUNS_ROOT: /app/runs
      VRS_SAMPLE_RTSP_URL: rtsp://127.0.0.1:8554/falldown
      VRS_POLICY_PATH: /app/configs/policies/safety.yaml
    volumes:
      - vrs-runs:/app/runs
    ports:
      - "5445:5445"

  console:
    build:
      context: .
      dockerfile: Dockerfile.console
    depends_on:
      backend:
        condition: service_healthy
      rtsp-falldown:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  vrs-runs:
  vrs-hf-cache:
