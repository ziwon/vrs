name: Set up VRS environment
description: Install uv, sync project deps, and pull required system libraries.

inputs:
  python-version:
    description: Python version to install via uv.
    required: false
    default: "3.11"
  install-system-libs:
    description: Whether to install opencv runtime libs (libgl1, libglib2.0-0).
    required: false
    default: "true"
  sync-args:
    description: Extra arguments to pass to `uv sync`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Install system libraries
      if: inputs.install-system-libs == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

    - name: Sync project
      shell: bash
      run: uv sync --frozen --python ${{ inputs.python-version }} ${{ inputs.sync-args }}
