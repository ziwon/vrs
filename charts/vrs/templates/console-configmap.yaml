{{- if .Values.console.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vrs.fullname" . }}-console
  labels:
    {{- include "vrs.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://{{ include "vrs.fullname" . }}-api:{{ .Values.api.port }}/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /config.js {
            add_header Cache-Control "no-store";
            try_files /config.js =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
  config.js: |
    window.VRS_CONFIG = {
      apiBaseUrl: {{ .Values.console.apiBaseUrl | quote }},
      defaultRun: {{ .Values.console.defaultRun | quote }},
      pollMs: {{ .Values.console.pollMs }},
    };
{{- end }}
